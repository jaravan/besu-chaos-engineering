# Lint the scripts, verify the docs' internal cross-links, then spin up kind,
# install the published chart, and run real scenarios end-to-end. The e2e job
# runs the same entrypoints the README documents (make install / make
# scenario-NN), on both consensus engines.
# The weekly cron catches chart/image drift with no code change: the chart and
# images are pulled fresh from their registries on every run.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 5 * * 1" # weekly - catches chart/image drift with no code change
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    # explicit bash => -o pipefail, so `make … | tee` fails when make fails
    shell: bash

jobs:
  lint:
    name: shellcheck + markdown links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck (errors + warnings gate)
        run: shellcheck --source-path=. -x --severity=warning scripts/lib.sh scenarios/*/run.sh

      - name: markdown cross-links (offline, fragments included)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml --offline --include-fragments 'README.md' 'scenarios/**/*.md' 'runbook/*.md'
          fail: true

  e2e:
    name: "kind e2e (${{ matrix.consensus }}): install + scenario 01"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      # one engine failing must not cancel the other — we want both signals
      fail-fast: false
      matrix:
        consensus: [qbft, ibft2]
    steps:
      - uses: actions/checkout@v4

      - name: create kind cluster
        uses: helm/kind-action@v1
        with:
          # context "kind-besu-chaos" - recognized by the repo's own
          # guard_local_context, exactly as a local run would be
          cluster_name: besu-chaos

      - name: "install besu-sandbox (CONSENSUS=${{ matrix.consensus }}, chart + version pinned by the Makefile)"
        run: |
          mkdir -p ci-logs
          make install CONSENSUS=${{ matrix.consensus }} 2>&1 | tee ci-logs/install.log

      - name: helm test
        run: make test 2>&1 | tee ci-logs/helm-test.log

      - name: "scenario 01 - validator loss (CONSENSUS=${{ matrix.consensus }}: single loss, then quorum loss + measured RTO)"
        run: make scenario-01 CONSENSUS=${{ matrix.consensus }} 2>&1 | tee ci-logs/scenario-01.log

      # scenario 10 is engine-independent (devp2p/eth handshake layer, below
      # consensus) — run it once, on the qbft leg, rather than redundantly on both
      - name: "scenario 10 - genesis config drift (control joiner, then drifted joiner)"
        if: matrix.consensus == 'qbft'
        run: make scenario-10 2>&1 | tee ci-logs/scenario-10.log

      - name: scenario results -> job summary
        if: always()
        run: |
          {
            echo "## Scenario results"
            echo '```'
            grep -hE '\[(PASS|FAIL)\]' ci-logs/scenario-*.log | sed -E 's/\x1b\[[0-9;]*m//g' \
              || echo "no scenario results captured"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: cluster forensics
        if: failure()
        run: |
          {
            echo "=== pods ==="
            kubectl get pods -A -o wide || true
            echo "=== recent events (besu) ==="
            kubectl -n besu get events --sort-by=.lastTimestamp | tail -50 || true
            for p in $(kubectl -n besu get pods -o name); do
              echo "=== logs: ${p} ==="
              kubectl -n besu logs "${p}" --tail=80 --all-containers || true
            done
          } 2>&1 | tee ci-logs/forensics.log

      - name: upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-${{ matrix.consensus }}
          path: ci-logs/
          retention-days: 14
